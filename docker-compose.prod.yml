services:
  web:
    build: .
    container_name: lana-8-wonder
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
    environment:
      - VIRTUAL_HOST=uk.lana8wonder.com,si.lana8wonder.com,hu.lana8wonder.com,at.lana8wonder.com
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=uk.lana8wonder.com,si.lana8wonder.com,hu.lana8wonder.com,at.lana8wonder.com
      - NODE_ENV=production
      - PORT=3000
      - LANA_REGISTER_API_KEY=REDACTED_API_KEY
    networks:
      - webproxy

networks:
  webproxy:
    external: true
